apiVersion: v1
kind: Service
metadata:
  name: {{ include "camera-cleaner.fullname" . }}-backend
  labels:
    {{- include "camera-cleaner.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "camera-cleaner.selectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
