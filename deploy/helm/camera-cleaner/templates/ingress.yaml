{{- if .Values.ingress.enabled -}}
{{- $fullname := include "camera-cleaner.fullname" . -}}
{{- if .Values.ingress.stripApiPrefix }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullname }}-strip-api
  labels:
    {{- include "camera-cleaner.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /api
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "camera-cleaner.labels" . | nindent 4 }}
  {{- if .Values.ingress.stripApiPrefix }}
  annotations:
    # Strip /api before the request reaches the backend (it serves routes at root).
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ $fullname }}-strip-api@kubernetescrd
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
