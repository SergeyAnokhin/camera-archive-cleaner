# ArgoCD Application — deploy with:
#   kubectl apply -f deploy/argocd/application.yaml
# ArgoCD watches the repo; when CI rewrites image tags in values.yaml it syncs.
#
# REQUIRED one-time cluster setup — apply the argocd-cm health patch so that
# the optional compute deployment never marks the app Degraded:
#   kubectl patch configmap argocd-cm -n argocd \
#     --type=merge --patch-file deploy/argocd/argocd-cm-patch.yaml
#   kubectl rollout restart deployment argocd-application-controller -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: camera-cleaner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SergeyAnokhin/camera-archive-cleaner.git
    targetRevision: deploy
    path: deploy/helm/camera-cleaner
    helm:
      releaseName: camera-cleaner
  destination:
    server: https://kubernetes.default.svc
    namespace: camera-cleaner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
