# Seed cameras — migrated into the database on first startup when the cameras table is empty.
# Not read afterwards; use Tools → Cameras in the UI to edit.
#
# Path resolution:
#   "./<subdir>"   → relative to backend/ (bundled demo data, works without CAMERA_ROOT)
#   "<subdir>"     → relative to CAMERA_ROOT env var (your real camera share)
#
# In Home Assistant: CAMERA_ROOT is set from the "camera_root" add-on option
# (e.g. /media/Camera after mounting your NAS share in Settings → System → Storage).

cameras:
  # ── Built-in demo ────────────────────────────────────────────────────────────
  # Three synthetic snapshots spanning March, August, and December 2024.
  # Always available — no CAMERA_ROOT needed. Click Scan to index, then explore.
  - id: "demo"
    name: "Demo Camera"
    path: "./demo_camera"

  # ── Real camera example (Home Assistant) ─────────────────────────────────────
  # Replace "MyCam" with the subfolder name on your mounted share.
  # Until the share is mounted and the path exists, the app shows setup instructions.
  - id: "my_camera"
    name: "My Camera"
    path: "MyCam"
