name: build-and-push

# Build the three images on every push to main, then write the new image tags
# back into the Helm values so ArgoCD picks up the change and rolls the pods.
on:
  push:
    branches: [main]
    paths:
      - backend/**
      - compute-service/**
      - frontend/**
      - shared/**
      - .github/workflows/build.yml

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write      # commit the values.yaml tag bump
  packages: write      # push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Compute lowercase registry base and tag
        id: vars
        run: |
          echo "registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.registry }}/backend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push compute
        uses: docker/build-push-action@v6
        with:
          context: .
          file: compute-service/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.registry }}/compute:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=compute
          cache-to: type=gha,scope=compute,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.registry }}/frontend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Bump image tags in Helm values
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          f=deploy/helm/camera-cleaner/values.yaml
          yq -i ".image.backend.tag = strenv(TAG)"  "$f"
          yq -i ".image.compute.tag = strenv(TAG)"  "$f"
          yq -i ".image.frontend.tag = strenv(TAG)" "$f"

      - name: Commit tag bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/camera-cleaner/values.yaml
          git diff --cached --quiet || git commit -m "ci: bump image tags to ${{ steps.vars.outputs.tag }} [skip ci]"
          git push origin HEAD:refs/heads/deploy --force
