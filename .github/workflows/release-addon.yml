name: Release HA Add-on

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Bump version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ inputs.version }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update config.yaml version
        run: |
          sed -i 's/^version: .*/version: "${{ inputs.version }}"/' camera-cleaner-addon/config.yaml
          grep "^version:" camera-cleaner-addon/config.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add camera-cleaner-addon/config.yaml
          git commit -m "chore(addon): bump version to ${{ inputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag addon/v${{ inputs.version }}
          git push origin addon/v${{ inputs.version }}

      - name: Set image name
        id: meta
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/camera-cleaner-addon" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-debian:bookworm
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-debian:bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: addon/v${{ needs.prepare.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: camera-cleaner-addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: BUILD_FROM=${{ matrix.base }}
          tags: ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  build-compute:
    name: Build compute-service image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: addon/v${{ needs.prepare.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set compute image name
        id: compute-meta
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/camera-compute" >> $GITHUB_OUTPUT

      - name: Build and push compute image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: compute-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.compute-meta.outputs.image }}:${{ needs.prepare.outputs.version }}
            ${{ steps.compute-meta.outputs.image }}:latest
          cache-from: type=gha,scope=compute
          cache-to: type=gha,scope=compute,mode=max

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ needs.prepare.outputs.image }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-aarch64"
